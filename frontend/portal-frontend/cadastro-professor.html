<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro Professor - Portal Escolar</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Cadastro Professor</h1>

        <input id="nome"      type="text"     placeholder="Nome completo">
        <input id="usuario"   type="text"     placeholder="Usuário (login)">
        <input id="senha"     type="password" placeholder="Senha">
        <input id="materia"   type="text"     placeholder="Matéria">
        <input id="registro"  type="text"     placeholder="Registro profissional">

        <button onclick="cadastrarProfessor()">Cadastrar</button>

        <a href="index.html">Voltar</a>
    </div>
</div>

</body>
</html>
