<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Responsável — Portal Escolar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="card">
        <div class="logo">
            <span>👨‍👧</span>
            <h1>Cadastro Responsável</h1>
            <p>Acompanhe o desempenho dos seus filhos</p>
        </div>

        <input id="nome"     type="text" placeholder="Nome completo">
        <input id="rg"       type="text" placeholder="RG ou CPF">
        <input id="telefone" type="text" placeholder="Telefone">
        <input id="usuario"  type="text" placeholder="Usuário (login)">
        <input id="senha"    type="password" placeholder="Senha">

        <div class="divider">Vincular Alunos</div>

        <div id="filhos-container">
            <input class="matricula-input" type="text" placeholder="Matrícula do Aluno 1">
        </div>

        <button class="btn-secondary" onclick="adicionarCampoFilho()" style="margin-top: 0; font-size: 13px;">
            + Adicionar outro aluno
        </button>

        <button class="btn-primary" onclick="cadastrarResponsavel()" style="margin-top: 24px;">Cadastrar</button>

        <div class="text-center">
            <a href="index.html">← Voltar ao login</a>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
